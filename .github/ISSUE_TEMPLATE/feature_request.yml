name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:

  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Is it related to a frustration with the current API?
      placeholder: "I'm always frustrated when …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include API sketches or code examples if possible.
      placeholder: |
        // I'd like an API like:
        $checker->newMethod('...');
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any other approaches? Workarounds you're currently using?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the package does this relate to?
      options:
        - "Format validation (isValid / validate / format)"
        - "Laravel validation rule (IndosRule)"
        - "Remote verification (verify / DgShippingVerifier)"
        - "Caching"
        - "Configuration / service provider"
        - "CLI / Artisan commands"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references that would help.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
