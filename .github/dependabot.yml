# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    # Without composer.lock, Dependabot only opens PRs when a new release
    # falls outside the current constraint in composer.json (major/minor
    # bumps), not for patch releases within an already-satisfied range.
    groups:
      # illuminate/* packages always move together with Laravel releases
      illuminate:
        patterns:
          - "illuminate/*"
      # PHPStan ecosystem (core + extensions move in lockstep)
      phpstan:
        patterns:
          - "phpstan/*"
          - "phpstan/extension-installer"
          - "phpstan/phpstan-deprecation-rules"
          - "phpstan/phpstan-phpunit"
          - "larastan/larastan"
      # Pest ecosystem
      pest:
        patterns:
          - "pestphp/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
